name: Publish

on:
  push:
    tags:
      - 'webshop-v*.*.*'

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - auth-service
          - product-service
          - checkout-service
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/webshop-v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build Docker image for scanning
        uses: docker/build-push-action@v5
        with:
          context: .
          build-args: |
            SERVICE=${{ matrix.service }}
          load: true
          push: false
          tags: hosseicyber/${{ matrix.service }}:${{ steps.version.outputs.version }}
          platforms: linux/amd64

      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          image: hosseicyber/${{ matrix.service }}:${{ steps.version.outputs.version }}
          format: cyclonedx-json
          artifact-name: ${{ matrix.service }}-sbom.cdx.json
          output-file: ${{ matrix.service }}-sbom.cdx.json
          upload-artifact: true
          upload-release-assets: false

      - name: Scan SBOM with Grype
        uses: anchore/scan-action@v7
        with:
          sbom: ${{ matrix.service }}-sbom.cdx.json
          fail-build: false
          severity-cutoff: critical

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          build-args: |
            SERVICE=${{ matrix.service }}
          push: true
          tags: |
            hosseicyber/${{ matrix.service }}:latest
            hosseicyber/${{ matrix.service }}:${{ steps.version.outputs.version }}
          platforms: linux/amd64,linux/arm64

grafana:

  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: default
          orgId: 1
          folder: Kubernetes
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/default

  dashboards:
    default:
      cluster-cpu-overview:
        json: |
          {
            "annotations": {
              "list": []
            },
            "editable": true,
            "panels": [
              {
                "datasource": {
                  "type": "prometheus",
                  "uid": "prom"
                },
                "fieldConfig": {
                  "defaults": {
                    "max": 100,
                    "min": 0,
                    "thresholds": {
                      "mode": "absolute",
                      "steps": [
                        {
                          "color": "green",
                          "value": null
                        },
                        {
                          "color": "orange",
                          "value": 70
                        },
                        {
                          "color": "red",
                          "value": 90
                        }
                      ]
                    },
                    "unit": "percent"
                  },
                  "overrides": []
                },
                "gridPos": {
                  "h": 8,
                  "w": 12,
                  "x": 0,
                  "y": 0
                },
                "id": 1,
                "options": {
                  "colorMode": "value",
                  "graphMode": "area",
                  "justifyMode": "center",
                  "orientation": "auto",
                  "reduceOptions": {
                    "calcs": [
                      "lastNotNull"
                    ],
                    "fields": "",
                    "values": false
                  },
                  "textMode": "value_and_name"
                },
                "targets": [
                  {
                    "expr": "100 * sum(rate(node_cpu_seconds_total{mode!=\"idle\"}[5m])) / sum(machine_cpu_cores)",
                    "legendFormat": "Cluster CPU",
                    "refId": "A"
                  }
                ],
                "title": "Cluster CPU Usage",
                "type": "stat"
              }
            ],
            "refresh": "30s",
            "schemaVersion": 39,
            "tags": [
              "kubernetes",
              "cpu"
            ],
            "templating": {
              "list": []
            },
            "time": {
              "from": "now-30m",
              "to": "now"
            },
            "timezone": "browser",
            "title": "Cluster CPU Overview",
            "version": 1
          }

  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Loki
          uid: loki
          type: loki
          url: http://{{ .Release.Name }}-loki-gateway
          isDefault: false
        - name: Prometheus-K8s
          uid: prom
          type: prometheus
          url: http://monitoring-kube-prometheus-prometheus.monitoring.svc.cluster.local:9090
          isDefault: true
        - name: Tempo
          uid: tempo
          type: tempo
          url: http://{{ .Release.Name }}-tempo-query-frontend:3200
          isDefault: false
          jsonData:
            tracesToLogsV2:
              datasourceUid: loki
            lokiSearch:
              datasourceUid: loki
            tracesToMetrics:
              datasourceUid: prom
            serviceMap:
              datasourceUid: prom
        - name: TestData
          uid: testdata
          type: testdata
          access: proxy
          isDefault: false

tempo:
  ingester:
    replicas: 2
